pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      glob: "*.{ts,js,svelte}"
      run: npx oxlint {staged_files}
    - name: oxfmt
      glob: "*.{ts,js,md,html,css,json,yml}"
      run: npx oxfmt --check {staged_files}
    - name: typecheck
      run: npm run check

pre-push:
  jobs:
    - name: test
      run: npm run test
